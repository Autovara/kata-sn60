services:
  kata-sn60-runner:
    # Digest, not a mutable tag: the value must match the approved TEE measurement policy.
    image: ${KATA_SN60_RUNNER_IMAGE:?Set an immutable runner image, for example registry/runner@sha256:...}
    ports:
      # Phala exposes this port through its HTTPS gateway so the external validator can reach the
      # room. /health and /pubkey are public; /run requires a signed, short-lived HMAC request.
      - "8080:8080"
    environment:
      # Shared secret the room requires on /run so only this validator can invoke a run
      # (delivered sealed, like the other secrets). Must match the validator's KATA_ROOM_AUTH_SECRET.
      - KATA_ROOM_AUTH_SECRET=${KATA_ROOM_AUTH_SECRET}
      # Keep diagnostics off in production. /pull-test is otherwise a signed POST-only endpoint.
      - KATA_ROOM_ENABLE_DIAGNOSTICS=false
      # Signed /run requests are valid for at most 900 seconds. This bounds
      # replay validity; the profile separately caps the agent process below.
      - KATA_ROOM_MAX_REQUEST_LIFETIME_SECONDS=900
      - KATA_ROOM_MAX_REQUEST_BYTES=1048576
      - KATA_ROOM_MAX_COMPRESSED_BUNDLE_BYTES=524288
      - KATA_ROOM_MAX_EXTRACTED_BUNDLE_BYTES=262144
      - KATA_ROOM_MAX_BUNDLE_FILES=16
      # NOTE: there is intentionally NO plaintext INFERENCE_API_KEY here — inference keys arrive
      # per request, sealed to the room, and are decrypted inside it (see room.sealing).
      # Registry read:packages login to pull the private problem image (sealed secret).
      - GHCR_USER=${GHCR_USER}
      - GHCR_TOKEN=${GHCR_TOKEN}
      # JSON map: each allowed project key -> sha256:<64 hex>. There is no :latest fallback.
      - KATA_SN60_TEE_IMAGE_DIGESTS_JSON=${KATA_SN60_TEE_IMAGE_DIGESTS_JSON}
      # --- in-room miner-funded multi-provider gateway ---
      # JSON registry of exact, operator-approved provider routes. Each miner's encrypted descriptor
      # selects one id from this registry; the miner never supplies an arbitrary endpoint or plaintext
      # key. The gateway does not set a model, sampling policy, token/call budget, or retry budget.
      - KATA_INFERENCE_GATEWAY_PROVIDER_ROUTES_JSON=${KATA_INFERENCE_GATEWAY_PROVIDER_ROUTES_JSON}
      # One miner-funded upstream call is bounded independently from the whole
      # agent process. These defaults form 180s < 840s < 900s.
      - KATA_INFERENCE_GATEWAY_TIMEOUT=${KATA_INFERENCE_GATEWAY_TIMEOUT:-180}
      - KATA_TEE_AGENT_EXECUTION_TIMEOUT_SECONDS=${KATA_TEE_AGENT_EXECUTION_TIMEOUT_SECONDS:-840}
    volumes:
      # dstack guest-agent socket -- lets the app call get_quote.
      - /var/run/dstack.sock:/var/run/dstack.sock
      # docker socket -- lets the runner pull/run the problem image inside the room.
      - /var/run/docker.sock:/var/run/docker.sock
