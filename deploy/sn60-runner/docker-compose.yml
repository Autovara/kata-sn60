services:
  kata-sn60-runner:
    image: docker.io/carloscosimano/kata-sn60-runner:v9
    ports:
      # /run runs a caller-supplied agent with a decrypted inference key — it MUST NOT be publicly
      # reachable. It is authenticated (HMAC over the body, see room.auth), but ALSO firewall this
      # port so only the validator host can reach it (e.g. bind to a private interface / security
      # group). Do not leave 8080 open to the internet.
      - "8080:8080"
    environment:
      # Shared secret the room requires on /run so only this validator can invoke a run
      # (delivered sealed, like the other secrets). Must match the validator's KATA_ROOM_AUTH_SECRET.
      - KATA_ROOM_AUTH_SECRET=${KATA_ROOM_AUTH_SECRET}
      # NOTE: there is intentionally NO plaintext INFERENCE_API_KEY here — inference keys arrive
      # per request, sealed to the room, and are decrypted inside it (see room.sealing).
      # Registry read:packages login to pull the private problem image (sealed secret).
      - GHCR_USER=${GHCR_USER}
      - GHCR_TOKEN=${GHCR_TOKEN}
      # --- in-room model-pinning relay (real, fair inference) ---
      # The relay forwards the miner's key DIRECTLY to a provider. Point it at a provider
      # serving the pinned model; e.g. AkashML + qwen3.6.
      - KATA_RELAY_DIRECT_UPSTREAM=${KATA_RELAY_DIRECT_UPSTREAM}
      - KATA_RELAY_DIRECT_MODEL=${KATA_RELAY_DIRECT_MODEL}
      - KATA_RELAY_PINNED_MODEL=${KATA_RELAY_PINNED_MODEL}
      - KATA_RELAY_DIRECT_KEY_PREFIXES=${KATA_RELAY_DIRECT_KEY_PREFIXES}
      - KATA_RELAY_DIRECT_ALLOW_UNKNOWN=${KATA_RELAY_DIRECT_ALLOW_UNKNOWN}
    volumes:
      # dstack guest-agent socket -- lets the app call get_quote.
      - /var/run/dstack.sock:/var/run/dstack.sock
      # docker socket -- lets the runner pull/run the problem image inside the room.
      - /var/run/docker.sock:/var/run/docker.sock
